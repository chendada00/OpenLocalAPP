<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>应用入口面板</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 20px;
}

.container { max-width: 820px; margin: auto; }

h1 { text-align: center; }

.card {
    background: #1e293b;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 15px;
}

/* IP */
.ip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.ip-list button {
    padding: 6px 12px;
    border-radius: 999px;
    border: none;
    background: #334155;
    color: #cbd5f5;
    cursor: pointer;
}

.ip-list button.active {
    background: #22c55e;
    color: #022c22;
}

/* 输入 */
.input-group {
    display: flex;
    margin-top: 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #334155;
}

.input-group input {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: white;
}

.input-group button {
    padding: 0 16px;
    background: #22c55e;
    border: none;
}

/* 应用 */
.apps {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}

.app {
    position: relative;
    background: #1e293b;
    padding: 22px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;

    border: 1px solid #1e293b; /* ⭐ 固定基础边框 */
}

.app:hover {
    transform: translateY(-3px);
    border-color: #334155;
}

/* ❌ 不再用状态影响 border */

/* 名称 */
.app-name {
    font-weight: 500;
}

/* ⭐ 状态点（右上角） */
.status-dot {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #64748b;
}

/* 在线 */
.online {
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse 1.5s infinite;
}

/* 离线 */
.offline {
    background: #ef4444;
    box-shadow: 0 0 6px #ef4444;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
    <h1>应用入口面板</h1>

    <div class="card">
        <h3>IP</h3>
        <div class="ip-list" id="ipList"></div>

        <div class="input-group">
            <input id="customIp" placeholder="输入IP">
            <button onclick="addIp()">添加</button>
        </div>
    </div>

    <div class="card">
        <h3>应用</h3>
        <div class="apps" id="apps"></div>
    </div>
</div>

<script>

let currentIp = "127.0.0.1";
const CHECK_INTERVAL = 20000;

const appList = [
    { name: "1Panel", protocol: "http", port: 2436, path: "/chenbo" },
    { name: "青龙", protocol: "http", port: 5700 },
    { name: "OpenList", protocol: "http", port: 5244 },
    { name: "隧道", protocol: "https", port: 7102 }
];

let ipCandidates = ["127.0.0.1"];

/* ================= URL ================= */
function buildUrl(app) {
    const protocol = app.protocol || "http";
    return `${protocol}://${currentIp}:${app.port || ""}${app.path || ""}`;
}

/* ================= UI ================= */
function renderApps() {
    const el = document.getElementById("apps");
    el.innerHTML = "";

    appList.forEach(app => {

        const div = document.createElement("div");
        div.className = "app";

        div.innerHTML = `
            <div class="status-dot"></div>
            <div class="app-name">${app.name}</div>
        `;

        div.onclick = () => {
            window.open(buildUrl(app), "_blank");
        };

        el.appendChild(div);
    });
}

/* ================= ⭐ 修复跨域检测 ================= */
async function check(app) {

    const url = buildUrl(app);

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 1500);

    try {
        // ⭐ 只判断是否能连通，不依赖CORS
        await fetch(url, {
            method: "GET",
            mode: "no-cors",
            signal: controller.signal
        });

        clearTimeout(timer);
        return true;

    } catch {
        clearTimeout(timer);
        return false;
    }
}

/* ================= 状态更新 ================= */
async function updateStatus() {

    const cards = document.querySelectorAll(".app");

    for (let i = 0; i < appList.length; i++) {

        const ok = await check(appList[i]);

        const card = cards[i];
        const dot = card.querySelector(".status-dot");

        dot.classList.remove("online", "offline");

        if (ok) {
            dot.classList.add("online");
        } else {
            dot.classList.add("offline");
        }
    }
}

/* ================= IP ================= */
function renderIPs() {
    const el = document.getElementById("ipList");
    el.innerHTML = "";

    ipCandidates.forEach(ip => {
        const btn = document.createElement("button");
        btn.innerText = ip;

        if (ip === currentIp) btn.classList.add("active");

        btn.onclick = () => {
            currentIp = ip;

            renderIPs();
            updateStatus(); // ⭐ 切换IP立即检测
        };

        el.appendChild(btn);
    });
}

function addIp() {
    const ip = document.getElementById("customIp").value.trim();
    if (!ip) return;

    if (!ipCandidates.includes(ip)) {
        ipCandidates.push(ip);
    }

    currentIp = ip;
    renderIPs();
}

/* ================= init ================= */
(function init() {

    renderIPs();
    renderApps();
    updateStatus();

    setInterval(updateStatus, CHECK_INTERVAL);

})();
</script>

</body>
</html>
