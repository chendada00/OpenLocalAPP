<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>应用入口面板</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont; background: #0f172a; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 820px; margin: auto; }
        h1 { text-align: center; color: #f8fafc; }
        .card { background: #1e293b; padding: 18px; border-radius: 14px; margin-bottom: 15px; border: 1px solid #334155; }
        .ip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .ip-list button { padding: 6px 14px; border-radius: 999px; border: 1px solid #475569; background: #334155; color: #cbd5e1; cursor: pointer; transition: 0.2s; }
        .ip-list button.active { background: #22c55e; color: #022c22; border-color: #22c55e; font-weight: bold; }
        .input-group { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid #334155; background: #0f172a; }
        .input-group input { flex: 1; padding: 10px; border: none; background: transparent; color: white; outline: none; }
        .input-group button { padding: 0 20px; background: #22c55e; border: none; color: #022c22; cursor: pointer; font-weight: bold; }
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .app { position: relative; background: #1e293b; padding: 25px 15px; border-radius: 12px; cursor: pointer; text-align: center; transition: all 0.3s; border: 1px solid #334155; }
        .app:hover { transform: translateY(-3px); background: #2d3748; border-color: #475569; }
        .status-dot { position: absolute; top: 10px; right: 10px; width: 10px; height: 10px; border-radius: 50%; background: #64748b; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        .offline { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .checking { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #apps {
            display: block;
        }

        .group {
            margin-bottom: 16px;
        }

        .group .apps {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .app {
            width: 152px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>应用入口面板</h1>
    <div class="card">
        <h3>管理 IP 节点</h3>
        <div class="ip-list" id="ipList"></div>
        <div class="input-group">
            <input id="customIp" placeholder="输入新 IP (例如 192.168.1.100)">
            <button onclick="addIp()">添加并切换</button>
        </div>
    </div>

    <div class="card">
        <h3>应用列表</h3>
        <div class="apps" id="apps"></div>
    </div>
</div>

<script>
/* ================= 配置与存储 ================= */
const appGroups = [
    {
        group: "内网",
        apps: [
            { name: "1Panel", protocol: "http", port: 2436, path: "/chenbo" },
            { name: "青龙", protocol: "http", port: 5700, checkPath: "/api/system/version" },
            { name: "OpenList", protocol: "http", port: 5244 },
            { name: "frpc1", protocol: "https", port: 7102 },
            { name: "frpc2", protocol: "https", port: 7103 },

        ]
    },
    {
        group: "公网",
        apps: [
            { name: "1Panel", url: "http://1p.xn--xpqp35o.cn/chenbo" },
            { name: "青龙", url: "http://ql.xn--xpqp35o.cn", checkPath: "/api/system/version" },
            { name: "OpenList", url: "http://olist.xn--xpqp35o.cn" }

        ]
    }
];

// 初始化数据（优先从缓存读）
let ipCandidates = JSON.parse(localStorage.getItem('ip_list')) || ["127.0.0.1"];
let currentIp = localStorage.getItem('current_ip') || ipCandidates[0];
function buildCheckUrl(app) {
    if (app.checkUrl) return app.checkUrl;
    const url = buildUrl(app);
    return `${url}/?t=${Date.now()}`;
}
function saveData() {
    localStorage.setItem('ip_list', JSON.stringify(ipCandidates));
    localStorage.setItem('current_ip', currentIp);
}

/* ================= URL 构建 ================= */
function buildUrl(app) {
    // 如果配置里直接写了 url (如 1Panel公网)，则直接返回它
    if (app.url) return app.url;

    // 否则，根据当前选择的 IP 动态拼接
    const protocol = app.protocol || "http";
    const port = app.port ? `:${app.port}` : "";
    const path = app.path || "";
    return `${protocol}://${currentIp}${port}${path}`;
}

/* ================= 状态检测 ================= */
async function checkStatus(app, index) {
    const dots = document.querySelectorAll(".status-dot");
    const dot = dots[index];
    dot.className = "status-dot checking";

    const url = buildUrl(app);
    const checkUrl = app.checkPath ? `${url}${app.checkPath}` : `${url}/?t=${Date.now()}`;

    let timeoutId;
    const controller = new AbortController();

    try {
        timeoutId = setTimeout(() => controller.abort(), 2000);

        await fetch(checkUrl, {
            mode: "no-cors",
            signal: controller.signal
        });

        clearTimeout(timeoutId);
        dot.className = "status-dot online";
    } catch (err) {
        clearTimeout(timeoutId);

        // 超时才算离线
        if (err.name === 'AbortError') {
            dot.className = "status-dot offline";
        } else {
            // TypeError 包括跨域拒绝和连接失败，都算在线（因为青龙就是这种情况）
            dot.className = "status-dot online";
        }
    }
}

function updateAllStatus() {
    let index = 0;
    appGroups.forEach(group => {
        group.apps.forEach(app => {
            checkStatus(app, index++);
        });
    });
}
/* ================= UI 渲染 ================= */
function renderApps() {
    const el = document.getElementById("apps");

    el.innerHTML = appGroups.map(group => `
        <div class="group">
            <h4 style="margin:10px 0;color:#94a3b8;">${group.group}</h4>
            <div class="apps">
                ${group.apps.map(app => `
                    <div class="app" onclick="window.open('${buildUrl(app)}', '_blank')">
                        <div class="status-dot"></div>
                        <div class="app-name">${app.name}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `).join("");
}

function renderIPs() {
    const el = document.getElementById("ipList");
    el.innerHTML = ipCandidates.map(ip => `
        <button class="${ip === currentIp ? 'active' : ''}" onclick="switchIp('${ip}')">${ip}</button>
    `).join("");
}

/* ================= 操作逻辑 ================= */
function switchIp(ip) {
    currentIp = ip;
    saveData();
    renderIPs();
    renderApps(); // 重新渲染应用以更新 URL
    updateAllStatus();
}

function addIp() {
    const input = document.getElementById("customIp");
    const ip = input.value.trim();
    if (!ip) return;

    if (!ipCandidates.includes(ip)) {
        ipCandidates.push(ip);
    }
    input.value = "";
    switchIp(ip);
}

/* ================= 初始化 ================= */
(function init() {
    renderIPs();
    renderApps();
    updateAllStatus();
    setInterval(updateAllStatus, 30000); // 每30秒自动刷新一次
})();
</script>

</body>
</html>
