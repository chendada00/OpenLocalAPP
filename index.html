<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>应用入口面板</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.container {
    max-width: 820px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 15px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.35);
}

.ip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.ip-list button {
    padding: 6px 12px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #334155;
    color: #cbd5f5;
    transition: 0.2s;
}

.ip-list button:hover {
    background: #475569;
}

.ip-list button.active {
    background: #22c55e;
    color: #022c22;
    font-weight: bold;
}

/* 输入框 */
.input-group {
    display: flex;
    margin-top: 12px;
    background: #0f172a;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #334155;
}

.input-group input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    background: transparent;
    color: white;
}

.input-group button {
    padding: 0 16px;
    border: none;
    background: #22c55e;
    color: #022c22;
    cursor: pointer;
    font-weight: bold;
}

.input-group button:hover {
    background: #16a34a;
}

/* 应用 */
.apps {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}

.app {
    background: linear-gradient(145deg, #334155, #1e293b);
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: 0.25s;
    border: 1px solid transparent;
}

.app:hover {
    transform: translateY(-4px);
    border: 1px solid #22c55e;
    box-shadow: 0 8px 20px rgba(34,197,94,0.2);
}

.app-name {
    font-size: 15px;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="container">
    <h1>设备入口面板</h1>

    <div class="card">
        <h3>当前IP</h3>
        <div class="ip-list" id="ipList"></div>

        <div class="input-group">
            <input id="customIp" placeholder="输入 IP，例如 192.168.1.10">
            <button onclick="setCustomIp()">添加</button>
        </div>
    </div>

    <div class="card">
        <h3>应用列表</h3>
        <div class="apps" id="apps"></div>
    </div>
</div>

<script>

let currentIp = "127.0.0.1";

// =======================
// 应用配置（可扩展）    { name: "百度", url: "https://www.baidu.com" }
// =======================
const appList = [
    { name: "1Panel", port: 2436, path: "/chenbo" },
    { name: "青龙", port: 5700},
    { name: "OpenList", port: 5244 },
    { name: "隧道", port: 7102 }
];

let ipCandidates = ["127.0.0.1"];

const STORAGE_KEY = "custom_ips";

// =======================
// 缓存处理
// =======================
function saveIPs() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ipCandidates));
}

function loadIPs() {
    const cache = localStorage.getItem(STORAGE_KEY);
    if (!cache) return [];
    try {
        return JSON.parse(cache);
    } catch {
        return [];
    }
}

// =======================
// IP UI
// =======================
function renderIPs() {
    const el = document.getElementById("ipList");
    el.innerHTML = "";

    ipCandidates.forEach(ip => {
        const btn = document.createElement("button");
        btn.innerText = ip;

        if (ip === currentIp) {
            btn.classList.add("active");
        }

        btn.onclick = () => {
            currentIp = ip;
            renderIPs();
        };

        // 右键删除IP（可选增强）
        btn.oncontextmenu = (e) => {
            e.preventDefault();
            ipCandidates = ipCandidates.filter(i => i !== ip);
            saveIPs();
            renderIPs();
        };

        el.appendChild(btn);
    });
}

// =======================
// 构建URL
// =======================
function buildUrl(app) {
    if (app.url) return app.url;

    const protocol = app.protocol || "http";
    const port = app.port ? `:${app.port}` : "";
    const path = app.path || "";

    return `${protocol}://${currentIp}${port}${path}`;
}

// =======================
// 应用UI
// =======================
function renderApps() {
    const el = document.getElementById("apps");
    el.innerHTML = "";

    appList.forEach(app => {
        const div = document.createElement("div");
        div.className = "app";

        div.innerHTML = `
            <div class="app-name">${app.name}</div>
        `;

        div.onclick = () => {
            window.open(buildUrl(app), "_blank");
        };

        el.appendChild(div);
    });
}

// =======================
// 添加IP
// =======================
function setCustomIp() {
    const ip = document.getElementById("customIp").value.trim();
    if (!ip) return;

    if (!ipCandidates.includes(ip)) {
        ipCandidates.push(ip);
        saveIPs(); // ⭐ 持久化
    }

    currentIp = ip;
    renderIPs();
}

// =======================
// WebRTC获取IP（可选）
// =======================
function getLocalIPs() {
    return new Promise(resolve => {
        const ips = new Set();

        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel("");

        pc.onicecandidate = (event) => {
            if (!event.candidate) {
                resolve([...ips]);
                return;
            }

            const match = event.candidate.candidate.match(
                /([0-9]{1,3}(\.[0-9]{1,3}){3})/
            );

            if (match) {
                ips.add(match[1]);
            }
        };

        pc.createOffer().then(offer => pc.setLocalDescription(offer));
    });
}

// =======================
// 初始化
// =======================
(async function init() {

    // 1️⃣ 加载缓存IP
    const cached = loadIPs();
    ipCandidates = [...new Set([...ipCandidates, ...cached])];

    // 2️⃣ 尝试WebRTC IP
    try {
        const ips = await getLocalIPs();
        if (ips.length) {
            ipCandidates = [...new Set([...ipCandidates, ...ips])];
            currentIp = ips[0];
        }
    } catch (e) {}

    renderIPs();
    renderApps();
})();

</script>

</body>
</html>
